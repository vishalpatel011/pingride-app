name: pingride
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  lottie: ^3.1.0
  geolocator: ^11.0.0
  permission_handler: ^11.0.1

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

  google_fonts: ^6.2.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# ✅ CORRECT PLACE (IMPORTANT)
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/images/